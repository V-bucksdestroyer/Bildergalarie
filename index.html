<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bildergalerie</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0e0e12;
    color: #f0f0f2;
    padding: 20px 16px 60px 16px;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 24px;
    background: linear-gradient(90deg, #7f5af0, #2cb67d);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .upload-box {
    max-width: 500px;
    margin: 0 auto 30px auto;
    background: #17171d;
    border: 1px solid #2a2a33;
    padding: 22px;
    border-radius: 16px;
    text-align: center;
  }

  input[type=file] { display: none; }

  .upload-label {
    display: inline-block;
    padding: 12px 26px;
    background: linear-gradient(90deg, #7f5af0, #6246ea);
    color: white;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    font-size: 15px;
    transition: opacity 0.15s;
  }
  .upload-label:hover { opacity: 0.85; }

  #status {
    margin-top: 12px;
    font-size: 13px;
    color: #a0a0ab;
    word-break: break-word;
  }
  #status.error { color: #ff6b6b; }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
    max-width: 1300px;
    margin: 0 auto;
  }

  @media (min-width: 700px) {
    .gallery { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
    h1 { font-size: 34px; }
  }

  .card {
    background: #17171d;
    border: 1px solid #2a2a33;
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.15s, border-color 0.15s;
  }
  .card:hover { transform: translateY(-3px); border-color: #7f5af0; }

  .card img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    background: #222;
    display: block;
  }

  .card-body {
    padding: 10px 12px;
  }

  .rank {
    font-size: 11px;
    color: #7f5af0;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .like-btn {
    background: #1f1f27;
    border: 1px solid #2a2a33;
    border-radius: 20px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 14px;
    color: #f0f0f2;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.15s, border-color 0.15s;
  }
  .like-btn:hover { border-color: #ff6b6b; }
  .like-btn.liked { background: #2a1418; border-color: #ff6b6b; color: #ff6b6b; }

  .like-count {
    font-weight: 700;
    font-size: 13px;
    color: #a0a0ab;
  }

  /* ---- Vote-Buttons (Up/Down) ---- */
  .vote-group {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #1f1f27;
    border: 1px solid #2a2a33;
    border-radius: 20px;
    padding: 4px 6px;
  }
  .vote-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 15px;
    padding: 4px 8px;
    border-radius: 14px;
    color: #a0a0ab;
    transition: background 0.15s, color 0.15s;
    line-height: 1;
  }
  .vote-btn.up:hover { background: #142a1e; color: #2cb67d; }
  .vote-btn.down:hover { background: #2a1418; color: #ff6b6b; }
  .vote-btn.up.active { color: #2cb67d; background: #142a1e; }
  .vote-btn.down.active { color: #ff6b6b; background: #2a1418; }

  .vote-score {
    font-weight: 700;
    font-size: 13px;
    min-width: 20px;
    text-align: center;
    color: #f0f0f2;
  }

  .comment-vote-group {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .comment-vote-group .vote-btn {
    font-size: 13px;
    padding: 2px 6px;
  }
  .comment-vote-group .vote-score {
    font-size: 12px;
    min-width: 16px;
  }

  .empty {
    text-align: center;
    color: #6a6a75;
    margin-top: 50px;
    font-size: 15px;
  }

  .setup-warning {
    max-width: 600px;
    margin: 0 auto 20px auto;
    background: #2a1418;
    border: 1px solid #ff6b6b;
    color: #ff9b9b;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
    display: none;
  }

  .card img { cursor: pointer; }

  /* ---- Modal ---- */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }

  .modal-box {
    position: relative;
    background: #17171d;
    border: 1px solid #2a2a33;
    border-radius: 16px;
    max-width: 900px;
    width: 100%;
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  @media (min-width: 800px) {
    .modal-box { flex-direction: row; }
  }

  .modal-img-wrap {
    flex: 1 1 55%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    max-height: 45vh;
  }
  @media (min-width: 800px) {
    .modal-img-wrap { max-height: 92vh; }
  }
  .modal-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .modal-side {
    flex: 1 1 45%;
    display: flex;
    flex-direction: column;
    min-height: 0;
    padding: 16px;
  }

  .modal-close {
    position: absolute;
    top: 14px;
    right: 18px;
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    font-size: 20px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 1001;
  }
  .modal-close:hover { background: rgba(255,255,255,0.28); }

  .modal-top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .comments-list {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 12px;
    padding-right: 4px;
  }
  .comment {
    background: #1f1f27;
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 8px;
    font-size: 14px;
    line-height: 1.4;
    word-break: break-word;
  }
  .comment-text { margin-bottom: 6px; }
  .comment-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .comment-time {
    font-size: 11px;
    color: #6a6a75;
  }
  .no-comments {
    color: #6a6a75;
    font-size: 13px;
    text-align: center;
    margin-top: 20px;
  }

  .comment-form {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .comment-form-row {
    display: flex;
    gap: 8px;
  }
  .comment-form input {
    flex: 1;
    background: #1f1f27;
    border: 1px solid #2a2a33;
    border-radius: 10px;
    padding: 10px 12px;
    color: #f0f0f2;
    font-size: 14px;
  }
  .comment-form input:focus { outline: 1px solid #7f5af0; }
  .comment-form button {
    background: linear-gradient(90deg, #7f5af0, #6246ea);
    border: none;
    color: white;
    border-radius: 10px;
    padding: 0 18px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
  }
  .comment-form button:hover { opacity: 0.85; }
  .char-counter {
    align-self: flex-end;
    font-size: 11px;
    color: #6a6a75;
  }
  .char-counter.limit { color: #ff6b6b; }
</style>
</head>
<body>

<h1>📸 Bildergalerie</h1>

<div id="setupWarning" class="setup-warning"></div>

<div class="upload-box">
  <label class="upload-label" for="fileInput">＋ Bild hochladen</label>
  <input type="file" id="fileInput" accept="image/*" multiple>
  <div id="status"></div>
</div>

<div id="gallery" class="gallery"></div>
<div id="emptyMsg" class="empty" style="display:none;">Noch keine Bilder hochgeladen. Sei die/der Erste!</div>

<div id="modalOverlay" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-img-wrap">
      <img id="modalImg" src="" alt="Bild groß">
    </div>
    <div class="modal-side">
      <div class="modal-top-row">
        <div class="vote-group" id="modalVoteGroup">
          <button class="vote-btn up" id="modalUpBtn">▲</button>
          <span class="vote-score" id="modalScore">0</span>
          <button class="vote-btn down" id="modalDownBtn">▼</button>
        </div>
      </div>
      <div class="comments-list" id="commentsList"></div>
      <form class="comment-form" id="commentForm">
        <div class="comment-form-row">
          <input type="text" id="commentInput" placeholder="Kommentar schreiben..." maxlength="300" required>
          <button type="submit">Senden</button>
        </div>
        <span class="char-counter" id="charCounter">0 / 300</span>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://ozojiuwppuehssicyfwq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96b2ppdXdwcHVlaHNzaWN5ZndxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDIzOTgsImV4cCI6MjA5OTE3ODM5OH0.nMFfkk6DhhWOXEYb-IzVXLr9ExcDu9n5lSy2V2A95yY";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const fileInput = document.getElementById('fileInput');
const galleryEl = document.getElementById('gallery');
const statusEl = document.getElementById('status');
const emptyMsg = document.getElementById('emptyMsg');
const setupWarning = document.getElementById('setupWarning');

const modalOverlay = document.getElementById('modalOverlay');
const modalImg = document.getElementById('modalImg');
const modalClose = document.getElementById('modalClose');
const modalUpBtn = document.getElementById('modalUpBtn');
const modalDownBtn = document.getElementById('modalDownBtn');
const modalScore = document.getElementById('modalScore');
const commentsList = document.getElementById('commentsList');
const commentForm = document.getElementById('commentForm');
const commentInput = document.getElementById('commentInput');
const charCounter = document.getElementById('charCounter');

const COMMENT_MAX_LEN = 300;
commentInput.addEventListener('input', () => {
  const len = commentInput.value.length;
  charCounter.textContent = `${len} / ${COMMENT_MAX_LEN}`;
  charCounter.classList.toggle('limit', len >= COMMENT_MAX_LEN);
});

let currentImages = [];
let currentModalId = null;

// Speichert Stimmen lokal: { "img:UUID": "up"|"down", "comment:UUID": "up"|"down" }
let myVotes = JSON.parse(localStorage.getItem('myVotes') || '{}');

function getVote(type, id) {
  return myVotes[`${type}:${id}`] || null;
}
function setVote(type, id, dir) {
  const key = `${type}:${id}`;
  if (dir === null) delete myVotes[key]; else myVotes[key] = dir;
  localStorage.setItem('myVotes', JSON.stringify(myVotes));
}

function showError(msg) {
  statusEl.textContent = msg;
  statusEl.classList.add('error');
}
function clearStatus() {
  statusEl.textContent = '';
  statusEl.classList.remove('error');
}

function showSetupWarning(msg) {
  setupWarning.textContent = msg;
  setupWarning.style.display = 'block';
}

async function loadImages() {
  const { data, error } = await sb
    .from('images')
    .select('*');

  if (error) {
    showSetupWarning('Datenbank-Fehler: ' + error.message + ' — prüfe die Tabelle "images" und die RLS Policies in Supabase.');
    return;
  }

  const sorted = (data || []).sort((a, b) => {
    const scoreDiff = (b.likes - b.dislikes) - (a.likes - a.dislikes);
    if (scoreDiff !== 0) return scoreDiff;
    return new Date(b.created_at) - new Date(a.created_at);
  });

  renderGallery(sorted);
}

function getPublicUrl(filePath) {
  const { data } = sb.storage.from('images').getPublicUrl(filePath);
  return data.publicUrl;
}

function renderGallery(images) {
  galleryEl.innerHTML = '';
  emptyMsg.style.display = images.length === 0 ? 'block' : 'none';

  images.forEach((img, index) => {
    const card = document.createElement('div');
    card.className = 'card';
    const myVote = getVote('img', img.id); // 'up' | 'down' | null
    const score = img.likes - img.dislikes;
    const url = getPublicUrl(img.file_path);

    card.innerHTML = `
      <img src="${url}" alt="Bild" loading="lazy" data-id="${img.id}">
      <div class="card-body">
        <div class="rank">#${index + 1}</div>
        <div class="card-footer">
          <div class="vote-group">
            <button class="vote-btn up ${myVote === 'up' ? 'active' : ''}" data-id="${img.id}" data-dir="up">▲</button>
            <span class="vote-score">${score}</span>
            <button class="vote-btn down ${myVote === 'down' ? 'active' : ''}" data-id="${img.id}" data-dir="down">▼</button>
          </div>
        </div>
      </div>
    `;

    galleryEl.appendChild(card);
  });

  document.querySelectorAll('.card .vote-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      voteImage(btn.dataset.id, btn.dataset.dir);
    });
  });

  document.querySelectorAll('.card img').forEach(imgEl => {
    imgEl.addEventListener('click', () => openModal(imgEl.dataset.id, imgEl.src));
  });

  currentImages = images;
}

// Generische Vote-Funktion für Bilder und Kommentare
async function castVote(table, id, dir) {
  const prevVote = getVote(table === 'images' ? 'img' : 'comment', id);
  const type = table === 'images' ? 'img' : 'comment';

  const { data: current, error: fetchError } = await sb
    .from(table)
    .select('likes, dislikes')
    .eq('id', id)
    .single();

  if (fetchError) {
    showError('Fehler: ' + fetchError.message);
    return;
  }

  let { likes, dislikes } = current;
  let newVote = dir;

  // Vorherige Stimme entfernen
  if (prevVote === 'up') likes = Math.max(0, likes - 1);
  if (prevVote === 'down') dislikes = Math.max(0, dislikes - 1);

  // Wenn gleicher Button nochmal geklickt wird -> Stimme zurücknehmen
  if (prevVote === dir) {
    newVote = null;
  } else {
    if (dir === 'up') likes += 1;
    if (dir === 'down') dislikes += 1;
  }

  const { error: updateError } = await sb
    .from(table)
    .update({ likes, dislikes })
    .eq('id', id);

  if (updateError) {
    showError('Fehler: ' + updateError.message);
    return;
  }

  setVote(type, id, newVote);
}

async function voteImage(id, dir) {
  await castVote('images', id, dir);
  await loadImages();
  if (currentModalId === id) updateModalVoteUI();
}

// ---- Modal: öffnen, schließen, Kommentare, Voting ----
function updateModalVoteUI() {
  const img = currentImages.find(i => i.id === currentModalId);
  if (!img) return;
  const myVote = getVote('img', img.id);
  modalUpBtn.classList.toggle('active', myVote === 'up');
  modalDownBtn.classList.toggle('active', myVote === 'down');
  modalScore.textContent = img.likes - img.dislikes;
}

async function openModal(id, imgUrl) {
  currentModalId = id;
  modalImg.src = imgUrl;
  updateModalVoteUI();
  modalOverlay.classList.add('open');
  await loadComments(id);
}

function closeModal() {
  modalOverlay.classList.remove('open');
  currentModalId = null;
  modalImg.src = '';
}

modalClose.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});
modalUpBtn.addEventListener('click', () => { if (currentModalId) voteImage(currentModalId, 'up'); });
modalDownBtn.addEventListener('click', () => { if (currentModalId) voteImage(currentModalId, 'down'); });

async function loadComments(imageId) {
  commentsList.innerHTML = '<div class="no-comments">Lade Kommentare...</div>';

  const { data, error } = await sb
    .from('comments')
    .select('*')
    .eq('image_id', imageId)
    .order('created_at', { ascending: true });

  if (error) {
    commentsList.innerHTML = `<div class="no-comments">Fehler beim Laden der Kommentare: ${error.message}</div>`;
    return;
  }

  if (!data || data.length === 0) {
    commentsList.innerHTML = '<div class="no-comments">Noch keine Kommentare. Schreib den ersten!</div>';
    return;
  }

  commentsList.innerHTML = data.map(c => {
    const myVote = getVote('comment', c.id);
    const score = c.likes - c.dislikes;
    return `
      <div class="comment">
        <div class="comment-text">${escapeHtml(c.text)}</div>
        <div class="comment-footer">
          <span class="comment-time">${new Date(c.created_at).toLocaleString('de-DE')}</span>
          <div class="comment-vote-group">
            <button class="vote-btn up ${myVote === 'up' ? 'active' : ''}" data-id="${c.id}" data-dir="up">▲</button>
            <span class="vote-score">${score}</span>
            <button class="vote-btn down ${myVote === 'down' ? 'active' : ''}" data-id="${c.id}" data-dir="down">▼</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  document.querySelectorAll('.comment-vote-group .vote-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      await castVote('comments', btn.dataset.id, btn.dataset.dir);
      await loadComments(imageId);
    });
  });

  commentsList.scrollTop = commentsList.scrollHeight;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

commentForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!currentModalId) return;

  const text = commentInput.value.trim().slice(0, COMMENT_MAX_LEN);
  if (!text) return;

  const { error } = await sb
    .from('comments')
    .insert({ image_id: currentModalId, text, likes: 0, dislikes: 0 });

  if (error) {
    alert('Fehler beim Senden: ' + error.message);
    return;
  }

  commentInput.value = '';
  charCounter.textContent = `0 / ${COMMENT_MAX_LEN}`;
  charCounter.classList.remove('limit');
  await loadComments(currentModalId);
});

// ---- Bildkomprimierung vor dem Hochladen (spart Speicherplatz) ----
function compressImage(file, maxDimension = 1600, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = (e) => { img.src = e.target.result; };
    reader.onerror = reject;

    img.onload = () => {
      let { width, height } = img;

      if (width > maxDimension || height > maxDimension) {
        if (width > height) {
          height = Math.round(height * (maxDimension / width));
          width = maxDimension;
        } else {
          width = Math.round(width * (maxDimension / height));
          height = maxDimension;
        }
      }

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);

      canvas.toBlob(
        (blob) => {
          if (!blob) { reject(new Error('Komprimierung fehlgeschlagen')); return; }
          resolve(blob);
        },
        'image/jpeg',
        quality
      );
    };
    img.onerror = reject;

    reader.readAsDataURL(file);
  });
}

fileInput.addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  if (files.length === 0) return;

  clearStatus();
  statusEl.textContent = 'Lade hoch...';

  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;

    let uploadBlob;
    try {
      uploadBlob = await compressImage(file);
    } catch (err) {
      showError(`Konnte "${file.name}" nicht verarbeiten, lade Original hoch.`);
      uploadBlob = file;
    }

    if (uploadBlob.size > 5 * 1024 * 1024) {
      showError(`"${file.name}" ist auch nach Komprimierung zu groß (max. 5 MB).`);
      continue;
    }

    const filePath = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}.jpg`;

    const { error: uploadError } = await sb.storage
      .from('images')
      .upload(filePath, uploadBlob, { contentType: 'image/jpeg' });

    if (uploadError) {
      showError(`Upload-Fehler: ${uploadError.message}`);
      continue;
    }

    const { error: insertError } = await sb
      .from('images')
      .insert({ file_path: filePath, likes: 0, dislikes: 0 });

    if (insertError) {
      showError(`Datenbank-Fehler: ${insertError.message}`);
    }
  }

  if (!statusEl.classList.contains('error')) clearStatus();
  fileInput.value = '';
  await loadImages();
});

loadImages();
</script>

</body>
</html>
